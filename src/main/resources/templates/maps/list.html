<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mappe mentali</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-shell">
    <header class="hero-card">
        <div>
            <h1>Mappe mentali per la primaria</h1>
            <p>Un editor semplice da usare per creare schemi chiari, colorati e stampabili.</p>
        </div>
    </header>

    <div th:if="${message}" class="flash-ok" th:text="${message}"></div>

    <section class="section-card">
        <h2>Crea una nuova mappa</h2>
        <form th:action="@{/maps}" method="post" th:object="${mapForm}" class="create-form">
            <label for="title">Titolo della mappa</label>
            <div class="form-row">
                <input id="title" type="text" th:field="*{title}" placeholder="Per esempio: Gli animali" maxlength="100">
                <button type="submit">Crea mappa</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </form>
    </section>

    <section class="section-card">
        <h2>Modelli pronti</h2>
        <div class="template-grid">
            <form th:action="@{/maps/template/italiano}" method="post"><button class="template-btn" type="submit">Italiano</button></form>
            <form th:action="@{/maps/template/scienze}" method="post"><button class="template-btn" type="submit">Scienze</button></form>
            <form th:action="@{/maps/template/storia}" method="post"><button class="template-btn" type="submit">Storia</button></form>
            <form th:action="@{/maps/template/geografia}" method="post"><button class="template-btn" type="submit">Geografia</button></form>
        </div>
    </section>

    <section class="section-card">
        <div class="section-header">
            <h2>Le mie mappe</h2>
            <span th:text="${#lists.size(maps)} + ' mappa/e'"></span>
        </div>
        <div class="map-grid" th:if="${!#lists.isEmpty(maps)}">
            <article class="map-card" th:each="map : ${maps}">
                <h3 th:text="${map.title}">Titolo</h3>
                <p>Ultima modifica: <span th:text="${#temporals.format(map.updatedAt, 'dd/MM/yyyy HH:mm')}"></span></p>
                <div class="card-actions">
                    <a class="secondary-btn" th:href="@{/maps/{id}(id=${map.id})}">Apri</a>
                    <form th:action="@{/maps/{id}/delete(id=${map.id})}" method="post" onsubmit="return confirm('Eliminare questa mappa?');">
                        <button class="danger-btn" type="submit">Elimina</button>
                    </form>
                </div>
            </article>
        </div>
        <p th:if="${#lists.isEmpty(maps)}">Non ci sono ancora mappe salvate.</p>
    </section>
</div>
</body>
</html>
