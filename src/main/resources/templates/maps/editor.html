<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${map.title}">Editor mappa</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="editor-page">
    <header class="editor-topbar">
        <div>
            <a class="back-link" th:href="@{/maps}">← Torna alle mappe</a>
            <h1 th:text="${map.title}">Titolo mappa</h1>
        </div>
        <div class="topbar-actions">
            <button type="button" id="add-root-btn">Aggiungi nodo</button>
            <button type="button" id="export-png-btn">Esporta PNG</button>
            <a class="secondary-btn" th:href="@{/api/maps/{id}/export(id=${map.id})}">Esporta HTML</a>
        </div>
    </header>

    <main class="editor-layout">
        <section class="canvas-panel">
            <div class="canvas-hint">Trascina i nodi con il mouse. Doppio clic sul testo per modificarlo al volo.</div>
            <svg id="mindmap-canvas" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg"></svg>
        </section>

        <aside class="side-panel">
            <h2>Nodo selezionato</h2>
            <label for="node-text">Testo</label>
            <input id="node-text" type="text" maxlength="100">

            <label for="node-color">Colore</label>
            <select id="node-color">
                <option value="#FFD966">Giallo</option>
                <option value="#9FC5E8">Azzurro</option>
                <option value="#B6D7A8">Verde</option>
                <option value="#F4CCCC">Rosa</option>
                <option value="#F9CB9C">Arancione</option>
                <option value="#D9D2E9">Lilla</option>
            </select>

            <label for="node-font-size">Grandezza testo</label>
            <input id="node-font-size" type="range" min="14" max="30" value="18">

            <label for="node-image-url">Immagine (link o caricamento)</label>
            <input id="node-image-url" type="url" placeholder="https://... oppure data:image/...">
            <div class="inline-actions">
                <button type="button" id="apply-image-url-btn" class="secondary-btn small-btn">Usa link</button>
                <button type="button" id="clear-image-btn" class="secondary-btn small-btn">Rimuovi immagine</button>
            </div>
            <input id="node-image-upload" type="file" accept="image/*">
            <div class="image-preview-box">
                <img id="node-image-preview" alt="Anteprima immagine nodo" />
            </div>

            <div class="panel-actions">
                <button type="button" id="save-node-btn">Salva modifiche</button>
                <button type="button" id="add-child-btn">Aggiungi ramo</button>
                <button type="button" id="delete-node-btn" class="danger-btn">Elimina nodo</button>
            </div>

            <div class="autosave-box" id="autosave-status">Modifiche salvate.</div>
        </aside>
    </main>
</div>

<script th:inline="javascript">
    const initialMap = /*[[${map}]]*/ {};
</script>
<script th:src="@{/js/mindmap-editor.js}"></script>
</body>
</html>
